{% extends "base.html" %}

{% block title %}Error del servidor - OrthoShop{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-icon">⚠️</div>
        <h1 class="error-code">500</h1>
        <h2 class="error-message">Error del servidor</h2>
        <p class="error-description">Algo salió mal. Por favor intenta de nuevo más tarde.</p>
        <a href="{{ url_for('index') }}" class="btn btn--primary">Volver al Catálogo</a>
    </div>
</div>
{% endblock %}
