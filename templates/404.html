{% extends "base.html" %}

{% block title %}Página no encontrada - OrthoShop{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-icon">😕</div>
        <h1 class="error-code">404</h1>
        <h2 class="error-message">Página no encontrada</h2>
        <p class="error-description">La página que buscas no existe o ha sido movida.</p>
        <a href="{{ url_for('index') }}" class="btn btn--primary">Volver al Catálogo</a>
    </div>
</div>
{% endblock %}
